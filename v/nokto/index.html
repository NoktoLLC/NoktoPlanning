<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nokto Group — Full List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; border-radius: 0 !important; }

    :root {
      --paper: #f6f3ee;
      --ink:   #0b0b0b;
      --bar:   #0b0b0b;
      --accent: #e21717;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'JetBrains Mono', monospace;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 48px;
      border-bottom: 1.5px solid var(--ink);
    }
    .back-link {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--ink);
      opacity: 0.6;
    }
    .back-link:hover { opacity: 1; }
    .nav-code {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.4;
    }

    /* ── MASTHEAD ── */
    .masthead {
      padding: 56px 48px 40px;
      border-bottom: 4px solid var(--ink);
    }
    .venture-meta {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.5;
      margin-bottom: 20px;
    }
    .venture-name {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(64px, 9vw, 130px);
      line-height: 0.9;
      letter-spacing: -0.025em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .venture-tagline {
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.55;
    }

    /* ── TASK LIST ── */
    .task-list {
      padding: 56px 48px 80px;
      max-width: 1000px;
    }
    .task-count {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.35;
      margin-bottom: 48px;
    }

    .task-row {
      display: flex;
      align-items: baseline;
      gap: 24px;
      margin-bottom: 32px;
    }
    .task-row.small { margin-bottom: 20px; }

    .task-num {
      font-size: 11px;
      letter-spacing: 0.16em;
      opacity: 0.3;
      flex-shrink: 0;
      width: 28px;
      font-variant-numeric: tabular-nums;
    }

    /* Task redaction */
    .task-text {
      background-image: linear-gradient(var(--bar), var(--bar));
      background-repeat: no-repeat;
      background-position: 0 58%;
      background-size: 0% 0.52em;
      -webkit-box-decoration-break: clone;
      box-decoration-break: clone;
      padding: 0 0.08em;
      margin: 0 -0.08em;
    }
    [data-done="true"] .task-text {
      background-size: 100% 0.52em;
    }

    /* Top tasks — big display type */
    .task-display .task-text {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(32px, 5vw, 72px);
      line-height: 0.95;
      letter-spacing: -0.025em;
      text-transform: uppercase;
    }

    /* Remaining tasks — mono */
    .task-mono .task-text {
      font-size: 22px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--ink);
      color: var(--paper);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 48px;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    footer span { opacity: 0.5; }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a class="back-link" href="../../">← Portfolio Roadmap</a>
    <span class="nav-code">N00 · Umbrella</span>
  </nav>

  <!-- MASTHEAD -->
  <div class="masthead">
    <div class="venture-meta">Nokto Group, LLC</div>
    <div class="venture-name">Nokto Group</div>
    <div class="venture-tagline">Holdings · Operations</div>
  </div>

  <!-- TASK LIST -->
  <div class="task-list" id="task-list"></div>

  <!-- FOOTER -->
  <footer>
    <span>Nokto Group, LLC</span>
    <span>© <span id="year"></span></span>
  </footer>

  <script>
    const TASKS = [
      { num: '01', text: 'Consolidate Q2 ledgers across the six ventures', done: false },
      { num: '02', text: 'Issue shared brand guidelines v3',               done: false },
      { num: '03', text: 'Hire portfolio operations lead',                 done: false },
      { num: '04', text: 'Stand up internal status dashboard',             done: false },
      { num: '05', text: 'File annual report with the state',              done: false },
    ];

    const list = document.getElementById('task-list');

    const open = TASKS.filter(t => !t.done).length;
    const countEl = document.createElement('div');
    countEl.className = 'task-count';
    countEl.textContent = `${open} of ${TASKS.length} open`;
    list.appendChild(countEl);

    TASKS.forEach((task, i) => {
      const isDisplay = i < 3;
      const row = document.createElement('div');
      row.className = `task-row ${isDisplay ? '' : 'small'}`;
      row.setAttribute('data-done', task.done ? 'true' : 'false');

      const num = document.createElement('span');
      num.className = 'task-num';
      num.textContent = task.num;

      const textWrap = document.createElement('div');
      textWrap.className = isDisplay ? 'task-display' : 'task-mono';

      const span = document.createElement('span');
      span.className = 'task-text';
      span.textContent = task.text;

      textWrap.appendChild(span);
      row.appendChild(num);
      row.appendChild(textWrap);
      list.appendChild(row);
    });

    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
